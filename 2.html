<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: white;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        .tab-bar {
            display: flex;
            background: #f5f5f5;
            border-bottom: 1px solid #ddd;
        }
        
        .tab {
            flex: 1;
            padding: 15px 0;
            text-align: center;
            font-family: Arial, sans-serif;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .tab.active {
            background: white;
            font-weight: bold;
            border-bottom: 3px solid #007AFF;
        }
        
        .chart-area {
            flex: 1;
            position: relative;
            background: white;
        }
        
        .chart-panel {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
            padding: 10px;
        }
        
        .chart-panel.active {
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        iframe {
            width: 100%;
            height: 90%;
            border: none;
            transform: scale(0.95);
            transform-origin: center center;
        }
    </style>
</head>
<body>
    <div class="tab-bar">
        <div class="tab active" onclick="showChart(0)">Chart 1</div>
        <div class="tab" onclick="showChart(1)">Chart 2</div>
    </div>
    
    <div class="chart-area">
        <div class="chart-panel active">
            <iframe src="https://docs.google.com/spreadsheets/d/e/2PACX-1vQkvV5SjwEw5Rx-rvXn5VxGr73RgbiF_FOL0jwa7M5mS9hc7KQWGnO4TkY0_Y9K8w/pubchart?oid=1734166825&format=interactive"></iframe>
        </div>
        <div class="chart-panel">
            <iframe src="https://docs.google.com/spreadsheets/d/e/2PACX-1vQkvV5SjwEw5Rx-rvXn5VxGr73RgbiF_FOL0jwa7M5mS9hc7KQWGnO4TkY0_Y9K8w/pubchart?oid=433715317&format=interactive"></iframe>
        </div>
    </div>

    <script>
        function showChart(index) {
            // Update tabs
            document.querySelectorAll('.tab').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('.tab')[index].classList.add('active');
            
            // Update panels
            document.querySelectorAll('.chart-panel').forEach(panel => panel.classList.remove('active'));
            document.querySelectorAll('.chart-panel')[index].classList.add('active');
        }
    </script>
</body>
</html>
