<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>📊 Responsive Chart Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(145deg, #f6f9fc 0%, #e6f0f5 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 12px;
        }

        .dashboard {
            width: 100%;
            max-width: 1400px;
            margin: 0 auto;
        }

        .chart-card {
            background: white;
            border-radius: 32px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .card-header {
            padding: 24px 28px;
            background: white;
            border-bottom: 1px solid rgba(0, 0, 0, 0.08);
        }

        .header-content {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 16px;
        }

        .title-section {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .title-icon {
            font-size: 32px;
            background: linear-gradient(135deg, #0066ff, #5c9aff);
            width: 56px;
            height: 56px;
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            box-shadow: 0 10px 20px -5px rgba(0, 102, 255, 0.3);
        }

        .title-text h1 {
            font-size: clamp(22px, 4vw, 32px);
            font-weight: 700;
            color: #1a2639;
            line-height: 1.2;
            margin-bottom: 4px;
        }

        .title-text p {
            color: #5a6b7c;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .live-badge {
            background: #e8f3ff;
            padding: 6px 14px;
            border-radius: 100px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            font-weight: 500;
            color: #0066ff;
        }

        .live-dot {
            width: 8px;
            height: 8px;
            background: #0066ff;
            border-radius: 50%;
            display: inline-block;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.2); }
            100% { opacity: 1; transform: scale(1); }
        }

        /* Main chart container - key for responsive scaling */
        .chart-container {
            width: 100%;
            padding: 24px;
            background: #ffffff;
            position: relative;
        }

        /* Responsive wrapper for the iframe */
        .chart-responsive-wrapper {
            position: relative;
            width: 100%;
            height: 0;
            padding-bottom: 61.8%; /* Golden ratio - adjust based on your chart's aspect ratio */
            background: #f8faff;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.02);
        }

        /* Style the iframe to fill the container */
        .chart-responsive-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100% !important;
            height: 100% !important;
            border: none;
            transform: scale(1);
            transition: transform 0.3s ease;
        }

        /* Alternative approach using viewport-scaled container */
        .chart-scale-wrapper {
            width: 100%;
            overflow: visible;
            background: #f8faff;
            border-radius: 20px;
            padding: 0;
            display: flex;
            justify-content: center;
        }

        .chart-scale-wrapper iframe {
            width: 100%;
            height: auto;
            min-height: 400px;
            max-width: 100%;
            border: none;
            object-fit: contain;
        }

        /* For better mobile scaling, use this combination */
        @media (max-width: 768px) {
            .chart-container {
                padding: 16px;
            }
            
            .chart-responsive-wrapper {
                padding-bottom: 75%; /* Slightly different ratio for mobile */
            }
            
            /* Ensure iframe content scales properly */
            .chart-responsive-wrapper iframe {
                transform-origin: 0 0;
                -webkit-transform-origin: 0 0;
            }
        }

        /* Chart info footer */
        .chart-footer {
            padding: 20px 28px 28px 28px;
            background: #ffffff;
            border-top: 1px solid rgba(0, 0, 0, 0.04);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 20px;
            margin-bottom: 24px;
        }

        .stat-block {
            background: #f8faff;
            border-radius: 18px;
            padding: 16px;
            text-align: center;
            transition: transform 0.2s ease;
        }

        .stat-block:hover {
            transform: translateY(-2px);
        }

        .stat-value {
            font-size: 24px;
            font-weight: 700;
            color: #0066ff;
            margin-bottom: 4px;
        }

        .stat-label {
            font-size: 13px;
            color: #5a6b7c;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
        }

        .action-bar {
            display: flex;
            gap: 12px;
            justify-content: flex-end;
            flex-wrap: wrap;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 14px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.2s ease;
            background: white;
            color: #0066ff;
            border: 1.5px solid #0066ff;
        }

        .btn-primary {
            background: linear-gradient(135deg, #0066ff, #5c9aff);
            color: white;
            border: none;
            box-shadow: 0 10px 20px -8px rgba(0, 102, 255, 0.4);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 25px -8px rgba(0, 102, 255, 0.5);
        }

        .btn:active {
            transform: translateY(0);
        }

        /* Zoom controls for better accessibility */
        .zoom-controls {
            display: flex;
            gap: 8px;
            margin-left: auto;
        }

        .zoom-btn {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            border: 1px solid #e0e7ff;
            background: white;
            font-size: 18px;
            font-weight: 600;
            color: #0066ff;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .zoom-btn:hover {
            background: #f0f5ff;
            border-color: #0066ff;
        }

        /* View options */
        .view-options {
            display: flex;
            gap: 8px;
            background: #f0f5ff;
            padding: 4px;
            border-radius: 12px;
        }

        .view-option {
            padding: 8px 16px;
            border: none;
            background: transparent;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 500;
            color: #5a6b7c;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .view-option.active {
            background: white;
            color: #0066ff;
            box-shadow: 0 2px 8px rgba(0, 102, 255, 0.15);
        }

        /* Responsive adjustments */
        @media (max-width: 640px) {
            body {
                padding: 8px;
            }

            .card-header {
                padding: 18px;
            }

            .title-icon {
                width: 48px;
                height: 48px;
                font-size: 28px;
            }

            .stat-block {
                padding: 12px;
            }

            .stat-value {
                font-size: 20px;
            }

            .action-bar {
                justify-content: stretch;
            }

            .btn {
                flex: 1;
            }

            .zoom-controls {
                margin-left: 0;
                width: 100%;
                justify-content: flex-end;
            }
        }

        /* For very small screens */
        @media (max-width: 380px) {
            .chart-responsive-wrapper {
                padding-bottom: 85%;
            }
            
            .stats-grid {
                grid-template-columns: 1fr;
            }
        }

        /* Loading state */
        .loading-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(255, 255, 255, 0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            z-index: 10;
        }

        .chart-container.loading .loading-overlay {
            opacity: 1;
            pointer-events: all;
        }

        .loader {
            width: 44px;
            height: 44px;
            border: 3px solid #f0f5ff;
            border-top: 3px solid #0066ff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Print styles */
        @media print {
            body {
                background: white;
                padding: 0;
            }
            
            .btn, .zoom-controls, .view-options {
                display: none;
            }
            
            .chart-card {
                box-shadow: none;
            }
        }
    </style>
</head>
<body>
    <div class="dashboard">
        <div class="chart-card">
            <div class="card-header">
                <div class="header-content">
                    <div class="title-section">
                        <div class="title-icon">
                            📊
                        </div>
                        <div class="title-text">
                            <h1>Analytics Overview</h1>
                            <p>
                                <span>Google Sheets Integration</span>
                                <span class="live-badge">
                                    <span class="live-dot"></span>
                                    LIVE
                                </span>
                            </p>
                        </div>
                    </div>
                    <div class="view-options">
                        <button class="view-option active" onclick="changeView('normal')">Normal</button>
                        <button class="view-option" onclick="changeView('wide')">Wide</button>
                        <button class="view-option" onclick="changeView('compact')">Compact</button>
                    </div>
                </div>
            </div>

            <div class="chart-container" id="chartContainer">
                <!-- Method 1: Responsive wrapper with fixed aspect ratio -->
                <div class="chart-responsive-wrapper" id="chartWrapper">
                    <iframe 
                        title="Google Sheets Chart"
                        src="https://docs.google.com/spreadsheets/d/e/2PACX-1vQkvV5SjwEw5Rx-rvXn5VxGr73RgbiF_FOL0jwa7M5mS9hc7KQWGnO4TkY0_Y9K8w/pubchart?oid=433715317&format=interactive"
                        loading="lazy"
                        frameborder="0">
                    </iframe>
                </div>
                
                <!-- Zoom controls for accessibility -->
                <div style="display: flex; justify-content: flex-end; margin-top: 16px;">
                    <div class="zoom-controls">
                        <button class="zoom-btn" onclick="zoomOut()">−</button>
                        <span style="padding: 8px 16px; background: #f8faff; border-radius: 12px; font-weight: 500;">100%</span>
                        <button class="zoom-btn" onclick="zoomIn()">+</button>
                    </div>
                </div>
                
                <div class="loading-overlay">
                    <div class="loader"></div>
                </div>
            </div>

            <div class="chart-footer">
                <div class="stats-grid">
                    <div class="stat-block">
                        <div class="stat-value">100%</div>
                        <div class="stat-label">📱 Responsive</div>
                    </div>
                    <div class="stat-block">
                        <div class="stat-value">Real-time</div>
                        <div class="stat-label">🔄 Auto Updates</div>
                    </div>
                    <div class="stat-block">
                        <div class="stat-value">Interactive</div>
                        <div class="stat-label">✨ Full Functionality</div>
                    </div>
                    <div class="stat-block">
                        <div class="stat-value">Any Device</div>
                        <div class="stat-label">📲 Mobile & Desktop</div>
                    </div>
                </div>

                <div class="action-bar">
                    <button class="btn" onclick="refreshChart()">
                        🔄 Refresh Data
                    </button>
                    <button class="btn btn-primary" onclick="openFullScreen()">
                        ⛶ Full Screen
                    </button>
                    <button class="btn" onclick="downloadChart()">
                        📥 Download
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Remove loading state when iframe loads
        const iframe = document.querySelector('iframe');
        const container = document.getElementById('chartContainer');
        
        iframe.addEventListener('load', function() {
            container.classList.remove('loading');
        });

        // Simulate initial loading
        container.classList.add('loading');
        
        // Full screen function
        function openFullScreen() {
            const wrapper = document.getElementById('chartWrapper');
            if (wrapper.requestFullscreen) {
                wrapper.requestFullscreen();
            } else if (wrapper.webkitRequestFullscreen) {
                wrapper.webkitRequestFullscreen();
            } else if (wrapper.msRequestFullscreen) {
                wrapper.msRequestFullscreen();
            }
        }

        // Refresh chart function
        function refreshChart() {
            container.classList.add('loading');
            const src = iframe.src;
            iframe.src = ''; // Clear src
            setTimeout(() => {
                iframe.src = src; // Restore src to reload
            }, 100);
        }

        // Zoom functions
        let zoomLevel = 1;
        const wrapper = document.getElementById('chartWrapper');
        
        function zoomIn() {
            zoomLevel = Math.min(zoomLevel + 0.1, 1.5);
            applyZoom();
        }
        
        function zoomOut() {
            zoomLevel = Math.max(zoomLevel - 0.1, 0.5);
            applyZoom();
        }
        
        function applyZoom() {
            const iframe = wrapper.querySelector('iframe');
            iframe.style.transform = `scale(${zoomLevel})`;
            iframe.style.width = `${100 / zoomLevel}%`;
            iframe.style.height = `${100 / zoomLevel}%`;
            
            // Update zoom indicator
            document.querySelector('.zoom-controls span').textContent = 
                Math.round(zoomLevel * 100) + '%';
        }

        // View change function
        function changeView(viewType) {
            const wrapper = document.getElementById('chartWrapper');
            const options = document.querySelectorAll('.view-option');
            
            options.forEach(opt => opt.classList.remove('active'));
            event.target.classList.add('active');
            
            switch(viewType) {
                case 'normal':
                    wrapper.style.paddingBottom = '61.8%';
                    break;
                case 'wide':
                    wrapper.style.paddingBottom = '50%';
                    break;
                case 'compact':
                    wrapper.style.paddingBottom = '75%';
                    break;
            }
        }

        // Download function (placeholder)
        function downloadChart() {
            alert('Chart download feature would be implemented here.\nYou can take a screenshot or export from Google Sheets directly.');
        }

        // Auto-refresh timestamp
        function updateTimestamp() {
            const now = new Date();
            const timeString = now.toLocaleTimeString('en-US', { 
                hour: '2-digit', 
                minute: '2-digit',
                second: '2-digit'
            });
            
            // You can add a timestamp display if needed
        }

        setInterval(updateTimestamp, 1000);

        // Handle resize events to ensure proper scaling
        window.addEventListener('resize', function() {
            // Adjust anything needed on resize
            if (window.innerWidth <= 768) {
                // Mobile adjustments
                document.querySelector('.chart-responsive-wrapper').style.paddingBottom = '75%';
            } else {
                // Desktop adjustments
                document.querySelector('.chart-responsive-wrapper').style.paddingBottom = '61.8%';
            }
        });

        // Initial setup based on screen size
        if (window.innerWidth <= 768) {
            document.querySelector('.chart-responsive-wrapper').style.paddingBottom = '75%';
        }
    </script>
</body>
</html>
